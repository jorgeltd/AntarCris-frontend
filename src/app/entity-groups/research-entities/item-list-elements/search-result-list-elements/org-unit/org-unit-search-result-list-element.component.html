<div class="row">
    <div *ngIf="showThumbnails" class="col-3 col-xl-2 pr-sm-0">
        <a *ngIf="linkType !== linkTypes.None" [target]="(linkType === linkTypes.ExternalLink) ? '_blank' : '_self'"
           [attr.rel]="(linkType === linkTypes.ExternalLink) ? 'noopener noreferrer' : null"
           [routerLink]="[itemPageRoute]" class="dont-break-out">
            <ds-thumbnail [thumbnail]="dso?.thumbnail | async"
                                 [defaultImage]="'assets/images/orgunit-placeholder.svg'"
                                 [alt]="'thumbnail.orgunit.alt'"
                                 [placeholder]="'thumbnail.orgunit.placeholder'">
            </ds-thumbnail>
        </a>
        <span *ngIf="linkType === linkTypes.None" class="dont-break-out">
            <ds-thumbnail [thumbnail]="dso?.thumbnail | async"
                          [defaultImage]="'assets/images/orgunit-placeholder.svg'"
                          [alt]="'thumbnail.orgunit.alt'"
                          [placeholder]="'thumbnail.orgunit.placeholder'">
            </ds-thumbnail>
        </span>
    </div>
    <div [ngClass]="showThumbnails ? 'col-9 col-xl-10' : 'col-md-12'">
      <div class="d-flex justify-content-between">
        <div class="flex-fill">
          <ds-badges *ngIf="showLabel" [object]="dso" [context]="context"></ds-badges>
            <ds-truncatable [id]="dso.id">
            <a *ngIf="linkType !== linkTypes.None" [target]="(linkType === linkTypes.ExternalLink) ? '_blank' : '_self'"
               [attr.rel]="(linkType === linkTypes.ExternalLink) ? 'noopener noreferrer' : null"
            [routerLink]="[itemPageRoute]" class="lead"
                      [innerHTML]="dsoTitle || ('orgunit.listelement.no-title' | translate)"></a>
            <span *ngIf="linkType === linkTypes.None"
                class="lead"
                [innerHTML]="dsoTitle || ('orgunit.listelement.no-title' | translate)"></span>
          <div class="text-muted" *ngIf="dso.firstMetadataValue('oairecerif.acronym')">
            {{ dso.firstMetadataValue('oairecerif.acronym') }}
          </div>
          <div *ngIf="dso.firstMetadataValue('organization.address.addressLocality') || dso.firstMetadataValue('organization.address.addressCountry')">
            <span *ngIf="dso.firstMetadataValue('organization.address.addressLocality')">{{ dso.firstMetadataValue('organization.address.addressLocality') }}</span>
            <span *ngIf="dso.firstMetadataValue('organization.address.addressLocality') && dso.firstMetadataValue('organization.address.addressCountry')">, </span>
            <span *ngIf="dso.firstMetadataValue('organization.address.addressCountry')">{{ dso.firstMetadataValue('organization.address.addressCountry') }}</span>
          </div>
          <div *ngIf="dso.firstMetadataValue('organization.identifier.ror') as metadataValue">
            <span class="d-flex align-items-center">
              <a [href]="getRorUrl(metadataValue)" target="_blank" rel="noopener noreferrer">
                https://ror.org/{{ getRorId(metadataValue) }}
              </a>
            </span>
          </div>
          <ds-additional-metadata [object]="dso"></ds-additional-metadata>
                </ds-truncatable>
          <ds-metric-badges *ngIf="showMetrics" class="d-block clearfix" [item]="dso"></ds-metric-badges>
        </div>
        <div class="align-self-center" *ngIf="showMetrics">
          <ds-metric-donuts [item]="dso"></ds-metric-donuts>
        </div>
    </div>
  </div>
</div>
